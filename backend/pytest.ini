# pytest.ini
#
# This file exists to configure global options for Pytest.
# Defining these values ensures consistent test runs across local development
# environments and CI/CD pipelines.

[pytest]
# 1. Python Path Integration
# By adding "." (the backend root directory) to the pythonpath, Pytest can resolve
# imports starting with "app" (e.g. from app.main import app) correctly without 
# requiring manual PYTHONPATH environment variable setups.
pythonpath = .

# 2. Test Locations
# Restricts test discovery to the tests/ directory.
testpaths = tests

# 3. Default Execution Arguments
# -v: Verbose test execution output (shows each test file and name).
# -ra: Prints a summary of all non-passing tests at the end of execution.
# --tb=short: Cleaner, shorter traceback formatting on test failures.
addopts = -v -ra --tb=short

# 4. Warnings Filtering
# Ignore third-party deprecation warnings to keep the test runner log outputs clean.
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning
